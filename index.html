<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oasis Hotel — TV & Radio Channels</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="channels">
    <header id="site-header"></header>

    <main>
      <h1>TV &amp; Radio Channels</h1>
      <p class="subtitle">
        Use the remote's number pad or arrow keys + OK to select a channel.
      </p>
      <div id="channel-grid" class="tile-grid"></div>
    </main>

    <footer id="sw-status-bar"></footer>

    <script src="js/nav.js"></script>
    <script src="js/render-grid.js"></script>
    <script src="js/register-sw.js"></script>
    <script src="js/sw-status.js"></script>
    <script>
      renderGrid("channel-grid", "data/channels.json", function (channel) {
        return (
          '<div class="tile" tabindex="0">' +
          '<span class="icon">' +
          channel.icon +
          "</span>" +
          '<span class="info">' +
          '<span class="number">CH ' +
          channel.number +
          "</span>" +
          '<span class="name">' +
          channel.name +
          "</span>" +
          '<span class="genre">' +
          channel.genre +
          "</span>" +
          "</span>" +
          "</div>"
        );
      });
    </script>
  </body>
</html>
