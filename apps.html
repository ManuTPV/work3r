<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HotelCast — Apps</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="apps">
  <header id="site-header"></header>

  <main>
    <h1>Apps</h1>
    <p class="subtitle">Select an app to launch it on this TV.</p>
    <div id="app-grid" class="tile-grid"></div>
  </main>

  <footer id="sw-status-bar"></footer>

  <script src="js/nav.js"></script>
  <script src="js/render-grid.js"></script>
  <script src="js/register-sw.js"></script>
  <script src="js/sw-status.js"></script>
  <script>
    renderGrid("app-grid", "data/apps.json", function (app) {
      return (
        '<div class="tile" tabindex="0" style="border-left: 4px solid ' + app.color + '">' +
        '<span class="icon">' + app.icon + '</span>' +
        '<span class="info">' +
        '<span class="name">' + app.name + '</span>' +
        '</span>' +
        '</div>'
      );
    });
  </script>
</body>
</html>
